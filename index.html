<title>考研错题复习</title>
<style>
:root {
  --pri: #5A9E8F; --pri-light: #EDF6F4; --pri-dark: #4A8A7C;
  --green: #4A8C5C; --green-bg: #EDF5EF;
  --blue: #3A7CA5; --blue-bg: #ECF3F8;
  --amber: #C48A2A; --amber-bg: #FDF5EA;
  --purple: #7B5EA7; --purple-bg: #F3EEF9;
  --red: #C47A7A; --red-bg: #F9F0F0;
  --gray: #7F8C8D; --gray-bg: #F0F2F2;
  --bg: #FAF7F2; --card: #fff; --text: #2D3436; --text2: #888; --text3: #BBB;
  --radius: 14px; --shadow: 0 2px 10px rgba(0,0,0,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  max-width: 500px; margin: 0 auto; padding-bottom: 90px;
  -webkit-font-smoothing: antialiased;
}
.header {
  background: linear-gradient(135deg, var(--pri) 0%, var(--pri-dark) 100%);
  color: #fff; padding: 22px 20px 16px; border-radius: 0 0 22px 22px;
  box-shadow: 0 4px 20px rgba(90,158,143,0.25);
}
.header h1 { font-size: 21px; font-weight: 700; letter-spacing: 0.5px; }
.header .sub { font-size: 12px; opacity: 0.8; margin-top: 3px; }
.stats { display: flex; gap: 8px; margin-top: 14px; }
.stat-box {
  flex: 1; background: rgba(255,255,255,0.18); border-radius: 12px;
  padding: 10px 0; text-align: center; backdrop-filter: blur(6px);
}
.stat-num { font-size: 22px; font-weight: 700; }
.stat-label { font-size: 10px; opacity: 0.85; margin-top: 2px; }
.tab-bar {
  display: flex; margin: 14px 16px 0; background: var(--card);
  border-radius: var(--radius); padding: 3px; box-shadow: var(--shadow);
}
.tab-btn {
  flex: 1; padding: 10px 0; border-radius: 11px; border: none;
  background: transparent; color: var(--text2); font-size: 13px;
  font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.tab-btn.active { background: var(--pri); color: #fff; }
.content { padding: 10px 16px; }
.section-label {
  font-size: 12px; font-weight: 600; color: var(--text3);
  margin: 14px 0 8px 4px; display: flex; align-items: center; gap: 6px;
}
.card {
  background: var(--card); border-radius: var(--radius); padding: 14px 16px;
  margin-bottom: 10px; box-shadow: var(--shadow); transition: transform 0.12s;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.card-top { display: flex; align-items: center; gap: 8px; }
.tag {
  display: inline-block; padding: 2px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
}
.problem-text { font-size: 14px; font-weight: 600; flex: 1; line-height: 1.4; }
.date-text { font-size: 11px; color: var(--text3); white-space: nowrap; }
.error-type {
  display: inline-block; font-size: 11px; padding: 2px 8px;
  border-radius: 6px; margin-top: 6px; font-weight: 500;
}
.note-text { font-size: 12px; color: var(--text2); margin-top: 5px; line-height: 1.4; }
.review-row { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
.review-dot {
  display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text3);
}
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-done { background: var(--green); }
.dot-due { background: var(--pri); }
.dot-pending { background: #DDD; }
.dot-blocked { background: #EEE; }
.review-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600;
}
.badge-urgent { background: var(--pri-light); color: var(--pri); }
.badge-normal { background: var(--blue-bg); color: var(--blue); }

}
.btn:active { opacity: 0.7; }
.btn-done { background: var(--green); color: #fff; }
.btn-fail { background: var(--red-bg); color: var(--red); }
.btn-action { background: #F5F3F0; color: var(--text2); font-size: 12px; padding: 6px 12px; }
.btn-danger { background: var(--pri-light); color: var(--pri); font-size: 12px; padding: 6px 12px; }
.btn-master { background: var(--green-bg); color: var(--green); font-size: 12px; padding: 6px 12px; }
.action-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.card-bottom {

.expanded { margin-top: 10px; padding-top: 10px; border-top: 1px solid #F0EDEA; }
.empty { text-align: center; padding: 44px 20px; color: var(--text3); }
.empty-icon { font-size: 38px; margin-bottom: 10px; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--text2); }
.empty-sub { font-size: 12px; margin-top: 5px; }
.fab {

  border-radius: 50%; background: linear-gradient(135deg, var(--pri), var(--pri-dark));
  color: #fff; border: none; font-size: 28px; box-shadow: 0 4px 16px rgba(90,158,143,0.35);
  cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 50;
}
.fab:active { transform: scale(0.92); }
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100;
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.modal {
  width: 100%; max-width: 500px; background: var(--card);
  border-radius: 22px 22px 0 0; padding: 22px 20px 34px;
  max-height: 88vh; overflow-y: auto; animation: slideModal 0.25s ease;

@keyframes slideModal { from { transform:translateY(40px); } to { transform:translateY(0); } }
.modal-head {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px;
}
.modal-title { font-size: 17px; font-weight: 700; }
.modal-close {
  background: none; border: none; font-size: 20px; color: var(--text3);

.form-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
.form-group { margin-bottom: 16px; }
.form-input {

.form-input:focus { border-color: var(--pri); background: #fff; }
.subject-picker { display: flex; flex-wrap: wrap; gap: 8px; }

   考研错题复习 v2 - Fixed Spaced Repetition
   轮次间隔：3天 → 7天 → 15天（累计：+3, +10, +25）
   修复：顺序执行 · 级联推迟 · 显示完成日期
   ═══════════════════════════════════════════════ */

const STORAGE_KEY = 'kaoyan_review_v4';
const OLD_STORAGE_KEY = 'kaoyan_review_v3';
const INTERVALS = [3, 10, 25];       // 累计天数（距录入日）
const INTER_GAPS = [3, 7, 15];       // 轮次间隔
const INTERVAL_LABELS = ['3天后', '10天后', '25天后'];

  { name:'高数', color:'#D4836A', bg:'#FBF0EB' },
  { name:'线代', color:'#3A7CA5', bg:'#ECF3F8' },

  { name:'其他', color:'#7F8C8D', bg:'#F0F2F2' },
];

const ERROR_TYPES = [
  { id:'concept', label:'概念不清', emoji:'🧠' },
  { id:'method', label:'方法不会', emoji:'🔧' },
  { id:'calc', label:'计算失误', emoji:'🔢' },
  { id:'careless', label:'粗心大意', emoji:'😵' },
];

/* ── Utilities ── */
const pad = n => String(n).padStart(2,'0');
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const toDateStr = d => { const x=new Date(d); return `${x.getFullYear()}-${pad(x.getMonth()+1)}-${pad(x.getDate())}`; };
const addDays = (s,n) => { const d=new Date(s+'T00:00:00'); d.setDate(d.getDate()+n); return toDateStr(d); };
const isDue = s => s <= todayStr();
const daysFrom = s => { const a=new Date(todayStr()+'T00:00:00'),b=new Date(s+'T00:00:00'); return Math.round((b-a)/864e5); };
const friendlyDate = s => { if(!s) return ''; const d=new Date(s+'T00:00:00'); return `${d.getMonth()+1}/${d.getDate()}`; };
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const getSub = name => SUBJECTS.find(s=>s.name===name) || SUBJECTS[6];
const getErr = id => ERROR_TYPES.find(e=>e.id===id);

const buildReviews = dateAdded => INTERVALS.map((days,i) => ({
  id: uid(), round: i+1, days, label: INTERVAL_LABELS[i],
  scheduledDate: addDays(dateAdded, days), done: false, correct: false,
}));

/* ── Migration ── */
function migrateProblems(problems) {
  if (!Array.isArray(problems)) return [];
  return problems.map(p => {
    if (!p.reviews || p.reviews.length < 3) {
      return { ...p, reviews: buildReviews(p.dateAdded) };
    }
    return {
      ...p,
      reviews: INTERVALS.map((days, i) => {
        const old = p.reviews[i];
        const newScheduled = addDays(p.dateAdded, days);
        if (old && old.done) {
          // keep completed status, update interval metadata
          return { ...old, days, label: INTERVAL_LABELS[i], scheduledDate: newScheduled };
        }
        return {
          id: old ? old.id : uid(),
          round: i + 1,
          days,
          label: INTERVAL_LABELS[i],
          scheduledDate: newScheduled,
          done: false,
          correct: false,
        };
      })
    };
  });
}

/* ── Storage ── */
function loadData() {
  try {
    const newRaw = localStorage.getItem(STORAGE_KEY);
    if (newRaw) {
      const parsed = JSON.parse(newRaw);
      if (parsed && parsed._v === 2) return parsed.problems || [];
      return migrateProblems(Array.isArray(parsed) ? parsed : []);
    }
    const oldRaw = localStorage.getItem(OLD_STORAGE_KEY);
    if (oldRaw) {
      const parsed = JSON.parse(oldRaw);
      const migrated = migrateProblems(Array.isArray(parsed) ? parsed : []);
      saveData(migrated);
      return migrated;
    }
    if (EMBEDDED_DATA && EMBEDDED_DATA.length > 0) {
      const migrated = migrateProblems(EMBEDDED_DATA);
      saveData(migrated);
      return migrated;
    }
    return [];
  } catch(e) { console.error(e); return []; }
}

function saveData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ _v: 2, problems: data }));
  } catch(e) { console.error(e); }
}

/* ── App State ── */
let state = {
  problems: loadData(),
  tab: 'today',
  showForm: false,
  editId: null,
  expandedId: null,
  toast: '',
  fSubject: '高数',
  fProblem: '',
  fNotes: '',
  fErrorType: '',
  fDate: todayStr(),
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

function flash(msg) {
  state.toast = msg;
  render();
  setTimeout(() => { state.toast = ''; render(); }, 1800);
}

/* ── Actions ── */
function openAdd() {
  setState({ showForm:true, editId:null, fSubject:'高数', fProblem:'', fNotes:'', fErrorType:'', fDate:todayStr() });
}

function openEdit(p) {
  setState({ showForm:true, editId:p.id, fSubject:p.subject, fProblem:p.problemId, fNotes:p.notes||'', fErrorType:p.errorType||'', fDate:p.dateAdded });
}

function submitForm() {
  if (!state.fProblem.trim()) return;
  const data = [...state.problems];
  if (state.editId) {
    const idx = data.findIndex(p=>p.id===state.editId);
    if (idx>=0) {
      const old = data[idx];
      const dateChanged = old.dateAdded !== state.fDate;
      data[idx] = { ...old, subject:state.fSubject, problemId:state.fProblem.trim(),
        notes:state.fNotes.trim(), errorType:state.fErrorType, dateAdded:state.fDate,
        reviews: dateChanged ? buildReviews(state.fDate) : old.reviews };
    }
    flash('已更新 ✓');
  } else {
    data.unshift({
      id:uid(), subject:state.fSubject, problemId:state.fProblem.trim(),
      notes:state.fNotes.trim(), errorType:state.fErrorType, dateAdded:state.fDate,
      reviews:buildReviews(state.fDate), mastered:false, createdAt:new Date().toISOString(),
    });
    flash('已添加 ✓');
  }
  saveData(data);
  setState({ problems:data, showForm:false });
}

function completeReview(pid, rid, correct) {
  const data = state.problems.map(p => {
    if (p.id !== pid) return p;
    const rIdx = p.reviews.findIndex(r => r.id === rid);
    if (rIdx < 0) return p;

    if (correct) {
      return { ...p, reviews: p.reviews.map((r, i) =>
        i === rIdx ? { ...r, done:true, correct:true, completedDate:todayStr() } : r
      )};
    }

    // Failed: reset this round to today+3, cascade subsequent rounds
    const newReviews = p.reviews.map(r => ({...r}));
    newReviews[rIdx].scheduledDate = addDays(todayStr(), 3);

    for (let i = rIdx + 1; i < newReviews.length; i++) {
      if (newReviews[i].done) continue;
      const prevDate = newReviews[i-1].done ? newReviews[i-1].completedDate || newReviews[i-1].scheduledDate : newReviews[i-1].scheduledDate;
      const minDate = addDays(prevDate, INTER_GAPS[i]);
      if (newReviews[i].scheduledDate < minDate) {
        newReviews[i].scheduledDate = minDate;
      }
    }

    return { ...p, reviews: newReviews };
  });
  saveData(data);
  setState({ problems:data });
  flash(correct ? '✓ 做对了，继续保持！' : '重新安排3天后复习');
}

function toggleMastered(id) {
  const data = state.problems.map(p => p.id===id ? { ...p, mastered:!p.mastered, masteredDate:!p.mastered?todayStr():null } : p);
  saveData(data);
  setState({ problems:data, expandedId:null });
  flash(data.find(p=>p.id===id).mastered ? '已移至已熟悉 ✓' : '已移回复习队列');
}

function deleteProblem(id) {
  if (!confirm('确定删除这道题？')) return;
  const data = state.problems.filter(p=>p.id!==id);
  saveData(data);
  setState({ problems:data, expandedId:null });
  flash('已删除');
}

/* ── Export / Import ── */
function exportData() {
  const json = JSON.stringify(state.problems, null, 2);
  const ta = document.getElementById('data-area');
  if (ta) { ta.value = json; ta.select(); }
  try { navigator.clipboard.writeText(json); flash('已复制到剪贴板 ✓'); }
  catch { flash('请手动复制下方文本'); }
}

function importData() {
  const ta = document.getElementById('data-area');
  if (!ta || !ta.value.trim()) { flash('请先粘贴数据'); return; }
  try {
    let data = JSON.parse(ta.value.trim());
    if (!Array.isArray(data)) throw new Error();
    // Auto-detect and migrate old format
    if (data.length > 0 && data[0].reviews && data[0].reviews.length >= 2) {
      const r = data[0].reviews;
      const gap01 = daysFrom2(r[0].scheduledDate, data[0].dateAdded);
      const gap12 = daysFrom2(r[1].scheduledDate, data[0].dateAdded);
      // Old format: intervals were 3,7,15 from dateAdded
      if (gap12 <= 8) {
        data = migrateProblems(data);
        flash(`已迁移并导入 ${data.length} 条记录 ✓`);
      } else {
        flash(`导入成功，共 ${data.length} 条记录 ✓`);
      }
    } else {
      flash(`导入成功，共 ${data.length} 条记录 ✓`);
    }
    saveData(data);
    setState({ problems:data });
  } catch { flash('数据格式错误，请检查'); }
}

function daysFrom2(dateA, dateB) {
  const a = new Date(dateA+'T00:00:00'), b = new Date(dateB+'T00:00:00');
  return Math.round((a-b)/864e5);
}

function clearAllData() {
  if (!confirm('确定清空所有数据？此操作不可恢复！')) return;
  saveData([]);
  setState({ problems:[] });
  flash('已清空所有数据');
}

/* ── Derived (with sequential enforcement) ── */
function getDue() {
  const res = [];
  state.problems.forEach(p => {
    if (p.mastered) return;
    p.reviews.forEach((r, i) => {
      if (r.done) return;
      if (!isDue(r.scheduledDate)) return;
      // Sequential: all previous rounds must be done
      const prevDone = p.reviews.slice(0, i).every(pr => pr.done);
      if (!prevDone) return;
      res.push({ problem:p, review:r });
    });
  });
  res.sort((a,b) => a.review.scheduledDate.localeCompare(b.review.scheduledDate));
  return res;
}

function getUpcoming() {
  const res = [];
  state.problems.forEach(p => {
    if (p.mastered) return;
    p.reviews.forEach((r, i) => {
      if (r.done) return;
      if (isDue(r.scheduledDate)) return;
      if (daysFrom(r.scheduledDate) > 14) return;
      // Sequential: all previous rounds must be done
      const prevDone = p.reviews.slice(0, i).every(pr => pr.done);
      if (!prevDone) return;
      res.push({ problem:p, review:r, diff:daysFrom(r.scheduledDate) });
    });
  });
  res.sort((a,b) => a.diff - b.diff);
  return res.slice(0, 8);
}

function getActive() {
  return state.problems.filter(p=>!p.mastered).sort((a,b)=>b.dateAdded.localeCompare(a.dateAdded));
}
function getMastered() {
  return state.problems.filter(p=>p.mastered).sort((a,b)=>(b.masteredDate||b.dateAdded).localeCompare(a.masteredDate||a.dateAdded));
}

/* ═══════ RENDER ═══════ */
function render() {
  const due = getDue(), upcoming = getUpcoming();
  const active = getActive(), mastered = getMastered();
  const app = document.getElementById('app');

  let html = '';

  // Toast
  if (state.toast) html += `<div class="toast">${state.toast}</div>`;

  // Header
  html += `<div class="header">
    <h1>📖 考研错题复习</h1>
    <div class="sub">间隔复习 · 3天 → 10天 → 25天</div>
    <div class="stats">
      <div class="stat-box"><div class="stat-num">${due.length}</div><div class="stat-label">待复习</div></div>
      <div class="stat-box"><div class="stat-num">${active.length}</div><div class="stat-label">跟踪中</div></div>
      <div class="stat-box"><div class="stat-num">${mastered.length}</div><div class="stat-label">已熟悉</div></div>
    </div>
  </div>`;

  // Tabs
  const tabs = [
    { id:'today', label:`待复习${due.length?` (${due.length})`:'' }` },
    { id:'all', label:'全部' },
    { id:'mastered', label:'已熟悉' },
    { id:'data', label:'⚙' },
  ];
  html += `<div class="tab-bar">${tabs.map(t =>
    `<button class="tab-btn${state.tab===t.id?' active':''}" onclick="setState({tab:'${t.id}',expandedId:null})">${t.label}</button>`
  ).join('')}</div>`;

  html += '<div class="content">';

  /* ── Today Tab ── */
  if (state.tab === 'today') {
    if (due.length === 0) {
      html += `<div class="empty">
        <div class="empty-icon">🎉</div>
        <div class="empty-title">今天没有待复习的题</div>
        <div class="empty-sub">${upcoming.length ? '最近一次复习在'+upcoming[0].diff+'天后' : '点击 + 录入错题开始'}</div>
      </div>`;
    } else {
      due.forEach(({ problem:p, review:r }) => {
        const s = getSub(p.subject);
        const overdue = -daysFrom(r.scheduledDate);
        const et = p.errorType ? getErr(p.errorType) : null;
        html += `<div class="card">
          <div class="card-top">
            <span class="tag" style="color:${s.color};background:${s.bg}">${p.subject}</span>
            <span class="problem-text">${esc(p.problemId)}</span>
          </div>
          ${et ? `<span class="error-type" style="background:${s.bg};color:${s.color}">${et.emoji} ${et.label}</span>` : ''}
          ${p.notes ? `<div class="note-text">💡 ${esc(p.notes)}</div>` : ''}
          <div class="card-bottom">
            <span class="review-badge ${overdue>0?'badge-urgent':'badge-normal'}">
              第${r.round}轮${overdue>0 ? ' · 逾期'+overdue+'天' : ' · '+r.label}
            </span>
            <div style="display:flex;gap:6px">
              <button class="btn btn-fail" onclick="completeReview('${p.id}','${r.id}',false)">✗ 做错了</button>
              <button class="btn btn-done" onclick="completeReview('${p.id}','${r.id}',true)">✓ 做对了</button>
            </div>
          </div>
        </div>`;
      });
    }
    if (upcoming.length > 0) {
      html += `<div class="section-label">📅 即将到来</div>`;
      upcoming.forEach(({ problem:p, review:r, diff }) => {
        const s = getSub(p.subject);
        html += `<div class="card" style="opacity:0.65">
          <div class="card-top">
            <span class="tag" style="color:${s.color};background:${s.bg}">${p.subject}</span>
            <span class="problem-text" style="font-size:13px">${esc(p.problemId)}</span>
            <span class="date-text">${diff}天后 · 第${r.round}轮</span>
          </div>
        </div>`;
      });
    }
  }

  /* ── All Tab ── */
  if (state.tab === 'all') {
    if (active.length === 0) {
      html += `<div class="empty"><div class="empty-icon">📝</div><div class="empty-title">还没有录入错题</div><div class="empty-sub">点击 + 开始记录</div></div>`;
    } else {
      active.forEach(p => {
        const s = getSub(p.subject);
        const expanded = state.expandedId === p.id;
        const allDone = p.reviews.every(r => r.done && r.correct);
        const et = p.errorType ? getErr(p.errorType) : null;
        html += `<div class="card" onclick="setState({expandedId:state.expandedId==='${p.id}'?null:'${p.id}'})">
          <div class="card-top">
            <span class="tag" style="color:${s.color};background:${s.bg}">${p.subject}</span>
            <span class="problem-text">${esc(p.problemId)}</span>
            <span class="date-text">${friendlyDate(p.dateAdded)}</span>
          </div>
          ${et ? `<span class="error-type" style="background:${s.bg};color:${s.color}">${et.emoji} ${et.label}</span>` : ''}
          ${p.notes ? `<div class="note-text">💡 ${esc(p.notes)}</div>` : ''}
          <div class="review-row">${p.reviews.map((r,i) => {
            let cls, txt;
            if (r.done && r.correct) {
              cls = 'dot-done';
              txt = friendlyDate(r.completedDate || r.scheduledDate) + ' ✓';
            } else if (!r.done && isDue(r.scheduledDate) && p.reviews.slice(0,i).every(pr=>pr.done)) {
              cls = 'dot-due';
              txt = '待复习';
            } else if (!r.done && !p.reviews.slice(0,i).every(pr=>pr.done)) {
              cls = 'dot-blocked';
              txt = friendlyDate(r.scheduledDate);
            } else {
              cls = 'dot-pending';
              txt = friendlyDate(r.scheduledDate);
            }
            return `<span class="review-dot"><span class="dot ${cls}"></span>第${i+1}轮 ${txt}</span>`;
          }).join('')}</div>
          ${expanded ? `<div class="expanded"><div class="action-row">
            <button class="btn btn-action" onclick="event.stopPropagation();openEdit(state.problems.find(x=>x.id==='${p.id}'))">✏️ 编辑</button>
            <button class="btn btn-master" onclick="event.stopPropagation();toggleMastered('${p.id}')">✅ ${allDone?'移至已熟悉':'直接标记熟悉'}</button>
            <button class="btn btn-danger" onclick="event.stopPropagation();deleteProblem('${p.id}')">🗑 删除</button>
          </div></div>` : ''}
        </div>`;
      });
    }
  }

  /* ── Mastered Tab ── */
  if (state.tab === 'mastered') {
    if (mastered.length === 0) {
      html += `<div class="empty"><div class="empty-icon">🌱</div><div class="empty-title">还没有已熟悉的题</div><div class="empty-sub">完成复习后可移到这里</div></div>`;
    } else {
      mastered.forEach(p => {
        const s = getSub(p.subject);
        html += `<div class="card" style="opacity:0.85">
          <div class="card-top">
            <span class="tag" style="color:${s.color};background:${s.bg}">${p.subject}</span>
            <span class="problem-text">${esc(p.problemId)}</span>
            <span class="date-text">${friendlyDate(p.dateAdded)}</span>
          </div>
          ${p.notes ? `<div class="note-text">💡 ${esc(p.notes)}</div>` : ''}
          <div class="action-row" style="margin-top:8px">
            <button class="btn btn-danger" onclick="toggleMastered('${p.id}')">↩ 移回复习</button>
          </div>
        </div>`;
      });
    }
  }

  /* ── Data Tab ── */
  if (state.tab === 'data') {
    html += `<div class="data-panel">
      <div style="font-size:14px;font-weight:600;margin-bottom:14px;color:var(--text)">📦 数据管理</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.6">
        数据存储在浏览器本地。<strong>建议定期导出备份</strong>，防止数据丢失。导入旧版数据会自动迁移为新间隔。
      </div>
      <button class="data-btn" onclick="exportData()">📤 导出数据（复制到剪贴板）</button>
      <textarea id="data-area" class="data-textarea" placeholder="导出的数据会显示在这里。导入时，粘贴 JSON 数据到这里再点导入。"></textarea>
      <button class="data-btn" onclick="importData()">📥 导入数据（兼容旧版）</button>
      <div style="height:16px"></div>
      <button class="data-btn danger" onclick="clearAllData()">🗑 清空所有数据</button>
      <div style="margin-top:20px;font-size:11px;color:var(--text3);line-height:1.6">
        当前记录数：${state.problems.length}<br>
        存储 Key：${STORAGE_KEY}<br>
        复习间隔：3天 → 10天 → 25天（累计）<br>
        轮次间隔：3天 · 7天 · 15天<br>
        做错处理：当前轮 +3天，后续轮级联推迟
      </div>
    </div>`;
  }

  html += '</div>';

  // FAB
  html += `<button class="fab" onclick="openAdd()">+</button>`;

  // Modal
  if (state.showForm) {
    const isEdit = !!state.editId;
    html += `<div class="overlay" onclick="setState({showForm:false})">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-head">
          <span class="modal-title">${isEdit?'编辑题目':'录入错题'}</span>
          <button class="modal-close" onclick="setState({showForm:false})">✕</button>
        </div>
        <div class="form-group">
          <div class="form-label">科目</div>
          <div class="subject-picker">${SUBJECTS.map(s =>
            `<button class="subject-btn${state.fSubject===s.name?' active':''}" style="${state.fSubject===s.name?`color:${s.color};background:${s.bg};border-color:${s.color}`:''}" onclick="setState({fSubject:'${s.name}'})">${s.name}</button>`
          ).join('')}</div>
        </div>
        <div class="form-group">
          <div class="form-label">题目描述</div>
          <input class="form-input" id="f-problem" placeholder="例：张宇30讲 第5讲 例题3" value="${esc(state.fProblem)}" oninput="state.fProblem=this.value">
        </div>
        <div class="form-group">
          <div class="form-label">错因分类（选填）</div>
          <div class="error-picker">${ERROR_TYPES.map(e =>
            `<button class="error-btn${state.fErrorType===e.id?' active':''}" onclick="setState({fErrorType:state.fErrorType==='${e.id}'?'':'${e.id}'})">${e.emoji} ${e.label}</button>`
          ).join('')}</div>
        </div>
        <div class="form-group">
          <div class="form-label">错因备注（选填）</div>
          <input class="form-input" id="f-notes" placeholder="例：换元积分忘记换上下限" value="${esc(state.fNotes)}" oninput="state.fNotes=this.value">
        </div>
        <div class="form-group">
          <div class="form-label">做题日期</div>
          <input type="date" class="form-input" value="${state.fDate}" onchange="setState({fDate:this.value})">
          <div class="preview-text">复习安排：${friendlyDate(addDays(state.fDate,3))}（3天后）· ${friendlyDate(addDays(state.fDate,10))}（10天后）· ${friendlyDate(addDays(state.fDate,25))}（25天后）</div>
        </div>
        <button class="submit-btn" onclick="submitForm()">${isEdit?'保存修改':'✓ 录入'}</button>
      </div>
    </div>`;
  }

  app.innerHTML = html;

  if (state.showForm) {
    const inp = document.getElementById('f-problem');
    if (inp && !state.editId) setTimeout(() => inp.focus(), 100);
  }
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

render();
</script>
</body>
</html>
